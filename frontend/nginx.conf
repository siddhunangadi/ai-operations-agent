# ============================================================
# nginx.conf — Nginx Configuration
#
# Architecture:
#   Browser → Nginx (:3000)
#     → /api/* → FastAPI backend (port 8000)
#     → /* → Static frontend files (HTML/CSS/JS)
#
# This is a production-ready configuration.
# ============================================================

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Enable gzip compression for text assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
  gzip_min_length 1024;

  # Connection settings
  sendfile        on;
  keepalive_timeout 65;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  server {
    listen 3000;
    server_name localhost;

    # Root: serve static files from the /app directory
    root /app;
    index index.html;

    # ---- Static Assets (long cache) ----
    location ~* \.(css|js|png|svg|ico|woff2|woff|ttf)$ {
      expires 7d;
      add_header Cache-Control "public, no-transform";
      try_files $uri =404;
    }

    # ---- API Proxy → FastAPI backend ----
    # All /api/* requests are forwarded to the backend container
    location /api/ {
      proxy_pass         http://backend:8000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # SSE requires these settings to work correctly
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 300s;
      chunked_transfer_encoding on;

      # CORS headers for development
      add_header Access-Control-Allow-Origin  "*" always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    # ---- Backend health endpoint ----
    location /health {
      proxy_pass http://backend:8000/api/v1/health;
      proxy_set_header Host $host;
    }

    # ---- Backend docs (Swagger UI) ----
    location /docs {
      proxy_pass http://backend:8000/docs;
      proxy_set_header Host $host;
    }

    location /openapi.json {
      proxy_pass http://backend:8000/openapi.json;
      proxy_set_header Host $host;
    }

    # ---- SPA Fallback ----
    # Pages HTML fragments are served as static files.
    # /pages/dashboard.html → /app/pages/dashboard.html
    location /pages/ {
      try_files $uri =404;
    }

    # All other routes serve index.html (SPA entrypoint)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
