# ============================================================
# docker-compose.yml
#
# Services:
#   backend  - FastAPI + LangGraph agent (port 8000)
#   frontend - Nginx serving static HTML/CSS/JS (port 3000)
#
# Architecture:
#   Browser → http://localhost:3000 (Nginx frontend)
#             → /api/* proxied to → backend:8000 (FastAPI)
#
# Start everything: docker compose up -d --build
# ============================================================

services:

  # ---- FastAPI Backend ----
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - AUTH_REQUIRED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Nginx Frontend ----
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
